    label { font-size: 12px; color: #4dff8c88; letter-spacing: .08em; text-transform: uppercase; }

    .status-lost     { background: #7a1c1c22; color: #ff4444;  border: 1px solid #ff444433; }

          </div>
          <div class="stat-chip text-center">
            <div class="text-xs text-turf/40 mb-1">Lider</div>
            <div class="text-xl">${leader ? playerEmoji(leader.player) : '—'}</div>
          </div>
        </div>
      </div>

      <!-- Ranking -->
      <div class="card p-4">
        <div class="text-xs text-turf/40 uppercase tracking-widest mb-3">🏆 Ranking</div>
        <div class="space-y-3">
          ${ranking.map((r, i) => `
            <div class="flex items-center gap-3 p-3 rounded-lg bg-pitch-700/40 card-hover transition-all">
              <div class="text-2xl w-8 text-center ${['rank-1','rank-2','rank-3'][i] || ''}">${medals[i] || (i+1)}</div>
              <div class="text-2xl">${playerEmoji(r.player)}</div>
              <div class="flex-1">
                <div class="font-bold text-sm">${r.player}</div>
                <div class="text-xs text-turf/40">${r.won}✅ ${r.lost}❌ ${r.pending}⏳</div>
              </div>
              <div class="text-right">
                <div class="font-bold ticker ${r.profit >= 0 ? 'profit-pos' : 'profit-neg'}">${fmt(r.profit)} zł</div>
                <div class="text-xs text-turf/40">${r.count} kuponów</div>
              </div>
            </div>
          `).join('')}
          ${ranking.length === 0 ? '<div class="text-center text-turf/30 py-8 text-sm">Brak kuponów. Dodaj pierwszy!</div>' : ''}
        </div>
      </div>

      <!-- My recent -->
      <div class="card p-4">
        <div class="text-xs text-turf/40 uppercase tracking-widest mb-3">🎫 Twoje ostatnie kupony</div>
        ${bets.filter(b => b.player === currentPlayer).slice(0, 3).map(b => renderMiniCoupon(b)).join('') || '<div class="text-center text-turf/30 py-4 text-sm">Brak kuponów.</div>'}
        ${bets.filter(b => b.player === currentPlayer).length > 3 ? `<button data-tab="bets" class="w-full text-center text-xs text-turf/50 hover:text-turf mt-3 transition-colors">Zobacz wszystkie →</button>` : ''}
      </div>
    </div>`;
  }

  function renderMiniCoupon(b) {
    const statusLabel = { pending: 'Oczekujący', won: 'Trafiony', lost: 'Nietrafiony' }[b.status];
    return `
    <div class="coupon-card ${b.status} rounded-lg p-3 mb-2 bg-pitch-700/30 flex items-center justify-between gap-2">
      <div class="flex-1 min-w-0">
        <div class="text-xs font-bold truncate">${b.match}</div>
        <div class="text-xs text-turf/40">${b.stake} zł × ${b.odds} = ${b.potentialWin} zł</div>
      </div>
      <span class="text-xs px-2 py-1 rounded-full whitespace-nowrap status-${b.status}">${statusLabel}</span>
    </div>`;
  }

  // ── ADD FORM ──────────────────────────────────────────────────
  function renderAddForm(bet = null) {
    const isEdit = !!bet;
    const matchOptions = MATCHES.map(m =>
      `<option value="${m.home} vs ${m.away}" ${bet && bet.match === m.home+' vs '+m.away ? 'selected' : ''}>${m.date} – ${m.home} vs ${m.away}</option>`
    ).join('');

    return `<div class="fade-in">
      <div class="card p-5">
        <div class="font-display text-2xl tracking-widest text-turf mb-5">${isEdit ? '✏️ EDYTUJ KUPON' : '➕ NOWY KUPON'}</div>
        <div class="space-y-4">

          <div>
            <label>Gracz</label>
            <select id="f-player">
              ${PLAYERS.map(p => `<option value="${p}" ${(bet ? bet.player : currentPlayer) === p ? 'selected':''}>${playerEmoji(p)} ${p}</option>`).join('')}
            </select>
          </div>

          <div>
            <label>Mecz</label>
            <select id="f-match">
              <option value="">— wybierz mecz —</option>
              ${matchOptions}
            </select>
          </div>

          <div class="grid grid-cols-2 gap-3">
            <div>
              <label>Kurs łączny</label>
              <input id="f-odds" type="number" step="0.01" min="1" placeholder="np. 4.50" value="${bet ? bet.odds : ''}" />
            </div>
            <div>
              <label>Stawka (zł)</label>
              <input id="f-stake" type="number" step="1" min="1" placeholder="np. 50" value="${bet ? bet.stake : ''}" />
            </div>
          </div>

          <div>
            <label>Potencjalna wygrana (zł)</label>
            <input id="f-win" type="number" step="0.01" min="0" placeholder="np. 225.00" value="${bet ? bet.potentialWin : ''}" />
            <div class="text-xs text-turf/40 mt-1">Wpisz ręcznie kwotę ewentualnej wygranej.</div>
          </div>

          ${isEdit ? `
          <div>
            <label>Status</label>
            <select id="f-status">
              <option value="pending" ${bet.status==='pending'?'selected':''}>⏳ Oczekujący</option>
              <option value="won"     ${bet.status==='won'    ?'selected':''}>✅ Trafiony</option>
              <option value="lost"    ${bet.status==='lost'   ?'selected':''}>❌ Nietrafiony</option>
            </select>
          </div>` : ''}

          <button id="submitBetBtn" class="btn-primary w-full text-sm" data-edit-id="${isEdit ? bet.id : ''}">
            ${isEdit ? '💾 Zapisz zmiany' : '🎫 Dodaj kupon'}
          </button>
          ${isEdit ? `<button id="cancelEditBtn" class="btn-ghost w-full text-sm mt-2">✕ Anuluj</button>` : ''}
        </div>
      </div>
    </div>`;
  }

  // ── BETS LIST ─────────────────────────────────────────────────
  function renderBetsList() {
    let filtered = [...bets];
    if (filterPlayer !== 'all') filtered = filtered.filter(b => b.player === filterPlayer);
    if (filterStatus !== 'all') filtered = filtered.filter(b => b.status === filterStatus);

    return `<div class="fade-in space-y-4">
      <!-- Filters -->
      <div class="card p-4 space-y-3">
        <div class="text-xs text-turf/40 uppercase tracking-widest">Filtry</div>
        <div>
          <label>Gracz</label>
          <select id="filterPlayer">
            <option value="all">Wszyscy gracze</option>
            ${PLAYERS.map(p => `<option value="${p}" ${filterPlayer===p?'selected':''}>${playerEmoji(p)} ${p}</option>`).join('')}
          </select>
        </div>
        <div>
          <label>Status</label>
          <select id="filterStatus">
            <option value="all">Wszystkie statusy</option>
            <option value="pending" ${filterStatus==='pending'?'selected':''}>⏳ Oczekujące</option>
            <option value="won"     ${filterStatus==='won'    ?'selected':''}>✅ Trafione</option>
            <option value="lost"    ${filterStatus==='lost'   ?'selected':''}>❌ Nietrafione</option>
          </select>
        </div>
      </div>

      <!-- Count -->
      <div class="text-xs text-turf/40 px-1">Znaleziono: <span class="text-turf">${filtered.length}</span> kuponów</div>

      <!-- List -->
      <div class="space-y-3">
        ${filtered.length === 0 ? '<div class="card p-8 text-center text-turf/30 text-sm">Brak kuponów spełniających kryteria.</div>' : ''}
        ${filtered.map(b => renderCouponCard(b)).join('')}
      </div>
    </div>`;
  }

  function renderCouponCard(b) {
    const statusLabel = { pending: '⏳ Oczekujący', won: '✅ Trafiony', lost: '❌ Nietrafiony' }[b.status];
    const profit = calcProfit(b);
    const profitClass = profit > 0 ? 'profit-pos' : profit < 0 ? 'profit-neg' : 'profit-neu';
    const date = b.createdAt?.toDate ? b.createdAt.toDate().toLocaleDateString('pl-PL') : '—';

    return `
    <div class="card coupon-card ${b.status} p-4 fade-in" data-bet-id="${b.id}">
      <div class="flex items-start justify-between gap-2 mb-3">
        <div class="flex items-center gap-2">
          <span class="text-lg">${playerEmoji(b.player)}</span>
          <span class="text-xs font-bold text-turf/60">${b.player}</span>
        </div>
        <span class="text-xs px-2 py-1 rounded-full status-${b.status}">${statusLabel}</span>
      </div>

      <div class="text-sm font-bold mb-1 text-white">${b.match}</div>
      <div class="text-xs text-turf/40 mb-3">Dodano: ${date}</div>

      <div class="grid grid-cols-3 gap-2 mb-4">
        <div class="stat-chip text-center">
          <div class="text-xs text-turf/40">Kurs</div>
          <div class="font-bold text-sm ticker">${b.odds}</div>
        </div>
        <div class="stat-chip text-center">
          <div class="text-xs text-turf/40">Stawka</div>
          <div class="font-bold text-sm ticker">${b.stake} zł</div>
        </div>
        <div class="stat-chip text-center">
          <div class="text-xs text-turf/40">Wygrana</div>
          <div class="font-bold text-sm ticker">${b.potentialWin} zł</div>
        </div>
      </div>

      <div class="flex items-center justify-between mb-4">
        <span class="text-xs text-turf/40">Profit:</span>
        <span class="font-bold ticker ${profitClass}">${fmt(profit)} zł</span>
      </div>

      <!-- Status change -->
      <div class="flex gap-2 mb-3">
        <button data-action="status" data-id="${b.id}" data-status="pending" class="flex-1 text-xs py-2 rounded-lg border ${b.status==='pending'?'status-pending':'border-pitch-600 text-turf/30 hover:text-turf/60'} transition-colors">⏳</button>
        <button data-action="status" data-id="${b.id}" data-status="won"     class="flex-1 text-xs py-2 rounded-lg border ${b.status==='won'    ?'status-won'    :'border-pitch-600 text-turf/30 hover:text-turf/60'} transition-colors">✅</button>
        <button data-action="status" data-id="${b.id}" data-status="lost"    class="flex-1 text-xs py-2 rounded-lg border ${b.status==='lost'   ?'status-lost'   :'border-pitch-600 text-turf/30 hover:text-turf/60'} transition-colors">❌</button>
      </div>

      <!-- Actions -->
      <div class="flex gap-2">
        <button data-action="edit" data-id="${b.id}" class="btn-ghost flex-1 text-xs">✏️ Edytuj</button>
        <button data-action="delete" data-id="${b.id}" class="btn-danger flex-1 text-xs">🗑️ Usuń</button>
      </div>
    </div>`;
  }

  // ── STATS ─────────────────────────────────────────────────────
  function renderStats() {
    const ranking = computeRanking();
    return `<div class="fade-in space-y-4">
      <div class="font-display text-2xl tracking-widest text-turf mb-2">📈 STATYSTYKI</div>
      ${ranking.map(r => renderPlayerStats(r)).join('')}
    </div>`;
  }

  function renderPlayerStats(r) {
    const eff = r.count > 0 ? ((r.won / r.count) * 100).toFixed(0) : 0;
    const effColor = eff >= 50 ? 'profit-pos' : 'profit-neg';

    return `
    <div class="card p-5">
      <div class="flex items-center gap-3 mb-4">
        <span class="text-3xl">${playerEmoji(r.player)}</span>
        <div>
          <div class="font-display text-xl tracking-widest text-turf">${r.player.toUpperCase()}</div>
          <div class="text-xs text-turf/40">${r.count} kuponów łącznie</div>
        </div>
      </div>
      <div class="grid grid-cols-2 gap-3">
        <div class="stat-chip">
          <div class="text-xs text-turf/40 mb-1">Trafione</div>
          <div class="text-xl font-bold profit-pos">${r.won} ✅</div>
        </div>
        <div class="stat-chip">
          <div class="text-xs text-turf/40 mb-1">Oczekujące</div>
          <div class="text-xl font-bold" style="color:#f5c518">${r.pending} ⏳</div>
        </div>
        <div class="stat-chip">
          <div class="text-xs text-turf/40 mb-1">Nietrafione</div>
          <div class="text-xl font-bold profit-neg">${r.lost} ❌</div>
        </div>
        <div class="stat-chip">
          <div class="text-xs text-turf/40 mb-1">Skuteczność</div>
          <div class="text-xl font-bold ${effColor}">${eff}%</div>
        </div>
        <div class="stat-chip">
          <div class="text-xs text-turf/40 mb-1">Suma stawek</div>
          <div class="text-xl font-bold ticker">${fmt(r.totalStake)} zł</div>
        </div>
        <div class="stat-chip">
          <div class="text-xs text-turf/40 mb-1">Profit</div>
          <div class="text-xl font-bold ticker ${r.profit >= 0 ? 'profit-pos' : 'profit-neg'}">${fmt(r.profit)} zł</div>
        </div>
      </div>
      <!-- Mini bar -->
      ${r.count > 0 ? `
      <div class="mt-4">
        <div class="text-xs text-turf/40 mb-1">Podział kuponów</div>
        <div class="flex rounded-full overflow-hidden h-3 gap-0.5">
          ${r.won     > 0 ? `<div class="bg-turf"     style="width:${(r.won    /r.count*100).toFixed(0)}%" title="Trafione"></div>` : ''}
          ${r.pending > 0 ? `<div class="bg-gold"     style="width:${(r.pending/r.count*100).toFixed(0)}%" title="Oczekujące"></div>` : ''}
          ${r.lost    > 0 ? `<div class="bg-red-bet"  style="width:${(r.lost   /r.count*100).toFixed(0)}%" title="Nietrafione"></div>` : ''}
        </div>
      </div>` : ''}
    </div>`;
  }

  // ── COMPUTATIONS ──────────────────────────────────────────────
  function computeRanking() {
    return PLAYERS.map(player => {
      const pb = bets.filter(b => b.player === player);
      const won     = pb.filter(b => b.status === 'won').length;
      const lost    = pb.filter(b => b.status === 'lost').length;
      const pending = pb.filter(b => b.status === 'pending').length;
      const profit  = pb.reduce((s, b) => s + calcProfit(b), 0);
      const totalStake = pb.reduce((s, b) => s + Number(b.stake || 0), 0);
      return { player, count: pb.length, won, lost, pending, profit, totalStake };
    }).sort((a, b) => b.profit - a.profit);
  }

  function computeTotals() {
    return { count: bets.length, profit: bets.reduce((s, b) => s + calcProfit(b), 0) };
  }

  function calcProfit(b) {
    if (b.status === 'won')  return Number(b.potentialWin || 0) - Number(b.stake || 0);
    if (b.status === 'lost') return -Number(b.stake || 0);
    return 0;
  }

  function fmt(n) {
    const v = Number(n || 0);
    return (v >= 0 ? '+' : '') + v.toFixed(2);
  }

  // ── LISTENERS ─────────────────────────────────────────────────
  function attachListeners() {
    // Switch player
    document.getElementById('switchPlayerBtn')?.addEventListener('click', () => {
      currentPlayer = null;
      localStorage.removeItem('currentPlayer');
      renderApp();
    });

    // Bottom nav
    document.querySelectorAll('[data-tab]').forEach(btn => {
      btn.addEventListener('click', () => {
        activeTab = btn.dataset.tab;
        editingBetId = null;
        renderApp();
      });
    });

    // Add/Edit form submit
    document.getElementById('submitBetBtn')?.addEventListener('click', submitBet);
    document.getElementById('cancelEditBtn')?.addEventListener('click', () => {
      activeTab = 'bets'; editingBetId = null; renderApp();
    });

    // Bets list filters
    document.getElementById('filterPlayer')?.addEventListener('change', e => { filterPlayer = e.target.value; renderApp(); });
    document.getElementById('filterStatus')?.addEventListener('change', e => { filterStatus = e.target.value; renderApp(); });

    // Coupon actions (edit / delete / status)
    document.querySelectorAll('[data-action]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const { action, id, status } = btn.dataset;
        if (action === 'edit') {
          const bet = bets.find(b => b.id === id);
          if (!bet) return;
          editingBetId = id;
          activeTab = 'add';
          const container = document.querySelector('.main-content > div') || document.querySelector('.main-content');
          if (container) container.innerHTML = renderAddForm(bet);
          document.getElementById('submitBetBtn')?.addEventListener('click', submitBet);
          document.getElementById('cancelEditBtn')?.addEventListener('click', () => { activeTab = 'bets'; editingBetId = null; renderApp(); });
        }
        if (action === 'delete') {
          if (!confirm(`Usunąć kupon? Tej operacji nie można cofnąć.`)) return;
          try {
            await deleteDoc(doc(db, 'bets', id));
            showToast('🗑️ Kupon usunięty');
          } catch(e) { showToast('❌ Błąd usuwania', true); }
        }
        if (action === 'status') {
          try {
            await updateDoc(doc(db, 'bets', id), { status });
            showToast({ pending:'⏳ Status: Oczekujący', won:'✅ Status: Trafiony', lost:'❌ Status: Nietrafiony' }[status]);
          } catch(e) { showToast('❌ Błąd zmiany statusu', true); }
        }
      });
    });
  }

  async function submitBet() {
    const player  = document.getElementById('f-player')?.value;
    const match   = document.getElementById('f-match')?.value;
    const odds    = parseFloat(document.getElementById('f-odds')?.value);
    const stake   = parseFloat(document.getElementById('f-stake')?.value);
    const potWin  = parseFloat(document.getElementById('f-win')?.value);
    const status  = document.getElementById('f-status')?.value || 'pending';
    const editId  = document.getElementById('submitBetBtn')?.dataset.editId;

    if (!match || !match.trim() || isNaN(odds) || isNaN(stake) || isNaN(potWin)) {
      showToast('⚠️ Wypełnij wszystkie pola', true); return;
    }

    const data = { player, match, odds, stake, potentialWin: potWin, status };

    try {
      if (editId) {
        await updateDoc(doc(db, 'bets', editId), data);
        showToast('💾 Kupon zaktualizowany');
      } else {
        data.createdAt = serverTimestamp();
        await addDoc(collection(db, 'bets'), data);
        showToast('🎫 Kupon dodany!');
      }
      activeTab = 'bets'; editingBetId = null; renderApp();
    } catch(e) {
      console.error(e);
      showToast('❌ Błąd zapisu', true);
    }
  }

  // ── TOAST ─────────────────────────────────────────────────────
  let toastTimeout;
  function showToast(msg, isError = false) {
    let el = document.getElementById('toast');
    if (!el) { el = document.createElement('div'); el.id = 'toast'; el.className = 'toast'; document.body.appendChild(el); }
    el.textContent = msg;
    el.style.background = isError ? '#ff4444' : '#1aff6b';
    el.style.color = isError ? '#fff' : '#0a0f0d';
    el.style.opacity = '1';
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(() => { if(el) el.style.opacity = '0'; }, 2500);
  }

  // ─── BOOT ─────────────────────────────────────────────────────
  init();
</script>

<div id="root"></div>

</body>
</html>
